
<div class="shell">
    <div class="header">
        <div class="profile-banner" id="banner"></div>
        <div class="profile-row">
            <div class="avatar" id="avatar"><div class="avatar-placeholder">?</div></div>
        </div>
        <div class="profile-meta">
            <div class="profile-name" id="pName">Loading…</div>
            <div class="profile-about" id="pAbout"></div>
            <div class="profile-npub" id="pNpub" title="Click to copy full npub"></div>
        </div>
    </div>
    <div class="status">
        <div class="dot" id="sDot"></div>
        <span id="sTxt">Connecting…</span>
    </div>
    <div class="errlog" id="errlog"></div>
    <div id="feed">
        <div class="loader"><div class="spinner"></div>Fetching notes…</div>
    </div>
</div>
